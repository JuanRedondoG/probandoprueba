{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow" style="background: #16213e; border: none;">
            <div class="card-header text-center bg-primary text-white py-3">
                <h4 class="mb-0">Iniciar Sesión</h4>
            </div>
            <div class="card-body p-4">
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-light">Usuario</label>
                        {{ form.username }}
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-light">Contraseña</label>
                        {{ form.password }}
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar</button>
                </form>
            </div>
            <div class="card-footer text-center bg-transparent border-0 pb-4">
                <small class="text-light">
                    ¿No tienes cuenta? 
                    <a href="{% url 'signup' %}" class="text-success fw-bold">Registrate aquí</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
